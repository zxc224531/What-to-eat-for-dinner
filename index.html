<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇困難症專用轉盤</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: '微軟正黑體', sans-serif;
            background-color: #fdfbf7;
            margin: 0;
            padding: 20px 10px;
        }
        h1 { color: #333; margin-bottom: 15px; font-size: 24px; }
        
        /* 分頁按鈕樣式 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background-color: #e0e0e0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }
        /* 飲料分頁特別顏色 */
        #btn-drinks.active {
            background-color: #34ace0;
            box-shadow: 0 4px 10px rgba(52, 172, 224, 0.3);
        }

        #wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 15px 0;
        }
        #pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #333;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        
        button {
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }
        button:active { transform: translateY(2px); }
        
        .spin-btn {
            padding: 12px 40px;
            font-size: 22px;
            background-color: #2ed573;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 5px;
        }
        
        #result {
            margin: 15px 0;
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            height: 35px;
            text-align: center;
        }

        /* 編輯區域樣式 */
        .edit-section {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 400px;
            margin-top: 15px;
        }
        .edit-section label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #666;
        }
        textarea {
            width: 100%;
            height: 70px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
            resize: none;
            font-family: '微軟正黑體', sans-serif;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        .update-btn {
            background-color: #747d8c;
            font-size: 14px;
            padding: 10px 15px;
        }
        .reset-btn {
            background-color: #ff6b81;
            font-size: 14px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>

    <h1>今晚吃/喝什麼？ 🤤</h1>

    <div class="tabs">
        <button id="btn-weekday" class="tab-btn active" onclick="switchTab('weekday')">📅 平日</button>
        <button id="btn-weekend" class="tab-btn" onclick="switchTab('weekend')">🎉 假日</button>
        <button id="btn-drinks" class="tab-btn" onclick="switchTab('drinks')">🥤 飲料</button>
    </div>
    
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>
    
    <div id="result">準備好就開轉！</div>
    
    <button class="spin-btn" onclick="spinWheel()">點我開轉！</button>

    <div class="edit-section">
        <label id="editLabel">✏️ 編輯清單 (用逗號隔開)：</label>
        <textarea id="optionsInput"></textarea>
        <div class="btn-group">
            <button class="update-btn" onclick="updateOptions()">✅ 更新轉盤</button>
            <button class="reset-btn" onclick="restoreDefault()">🔄 恢復預設</button>
        </div>
    </div>

    <script>
        // 預設資料
        const defaults = {
            weekday: "subway, 麥當勞, 肯德基, 便當, 滷味, 臭豆腐, 超商, 八方, 雞排, 炸雞, 回家煮, 小吃(麵)",
            weekend: "泰式, 鐵板燒, 炸物, 披薩, 麥當勞, 火鍋, 貳樓, 義式, 咖哩飯",
            drinks: "50嵐, 大茗, 清心, 麻古, 龜記, 五桐號, 珍煮丹, 得正, 青山, 烏弄"
        };

        // 儲存使用者編輯狀態
        let savedTexts = {
            weekday: defaults.weekday,
            weekend: defaults.weekend,
            drinks: defaults.drinks
        };

        let currentMode = 'weekday'; 
        let options = [];
        const colors = ["#ff9a9e", "#fecfef", "#a1c4fd", "#c2e9fb", "#d4fc79", "#96e6a1", "#ffd194", "#70e1f5", "#e2ebf0", "#cfd9df"];
        
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        let currentRotation = 0;
        let isSpinning = false;

        function switchTab(mode) {
            if (isSpinning) return;
            
            // 存儲目前的輸入
            savedTexts[currentMode] = document.getElementById("optionsInput").value;
            
            currentMode = mode;

            // 更新按鈕外觀
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            // 載入資料
            document.getElementById("optionsInput").value = savedTexts[mode];
            
            let statusText = "";
            if(mode === 'weekday') statusText = "📅 平日晚餐模式";
            else if(mode === 'weekend') statusText = "🎉 假日大餐模式";
            else statusText = "🥤 飲料消暑模式";
            
            document.getElementById("result").innerText = statusText;
            updateOptions();
        }

        function restoreDefault() {
            if (isSpinning) return;
            document.getElementById("optionsInput").value = defaults[currentMode];
            updateOptions();
            document.getElementById("result").innerText = "🔄 已恢復預設清單！";
        }

        function updateOptions() {
            if (isSpinning) return;
            const input = document.getElementById("optionsInput").value;
            options = input.split(',').map(item => item.trim()).filter(item => item !== "");
            
            if (options.length < 2) {
                alert("請至少輸入兩個項目！");
                return;
            }
            
            savedTexts[currentMode] = input;
            drawWheel();
        }

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numOptions; i++) {
                const angle = i * arcSize;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize, false);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(
                    centerX + Math.cos(angle + arcSize / 2) * (radius * 0.65), 
                    centerY + Math.sin(angle + arcSize / 2) * (radius * 0.65)
                );
                ctx.rotate(angle + arcSize / 2);
                ctx.fillStyle = "#333";
                
                // 動態字體大小
                let fontSize = 22;
                if (options.length > 10) fontSize = 16;
                if (options[i].length > 4) fontSize -= 4;
                
                ctx.font = `bold ${fontSize}px 微軟正黑體`;
                ctx.fillText(options[i], -ctx.measureText(options[i]).width / 2, 8);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            document.getElementById("result").innerText = "正在決定中...";

            const randomDegree = Math.floor(Math.random() * 360);
            const totalDegree = 1800 + randomDegree; 
            currentRotation += totalDegree;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const numOptions = options.length;
                const actualDegree = currentRotation % 360;
                const pointerAngle = (360 - actualDegree + 270) % 360;
                const winningIndex = Math.floor(pointerAngle / (360 / numOptions));
                
                const prefix = currentMode === 'drinks' ? "🥤 飲料喝：" : "🎉 決定吃：";
                document.getElementById("result").innerText = prefix + options[winningIndex] + "！";
                isSpinning = false;
            }, 4000);
        }

        // 初始化
        document.getElementById("optionsInput").value = defaults.weekday;
        updateOptions();
    </script>
</body>
</html>
